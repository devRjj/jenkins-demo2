<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Ecommerce Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .product {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 1rem;
            text-align: center;
        }
        .product img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product h2 {
            margin: 0.5rem 0;
        }
        .product p {
            font-size: 1.2rem;
            color: #333;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #218838;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Ecommerce Store</h1>
    </header>
    <main>
        <section class="products">
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+1" alt="Product 1">
                <h2>Laptop</h2>
                <p>$999.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+2" alt="Product 2">
                <h2>Smartphone</h2>
                <p>$599.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+3" alt="Product 3">
                <h2>Headphones</h2>
                <p>$149.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+4" alt="Product 4">
                <h2>Tablet</h2>
                <p>$399.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+5" alt="Product 5">
                <h2>Smartwatch</h2>
                <p>$249.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/250x150?text=Product+6" alt="Product 6">
                <h2>Keyboard</h2>
                <p>$79.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 My Ecommerce Store. All rights reserved.</p>
    </footer>
</body>
</html>
